name: Build Android APK (shop-mobile)

# 云端打包移动端 App 的 Android APK。
# 手动触发：GitHub 仓库 → Actions → 选本工作流 → Run workflow。
# 跑完在该次运行页面底部 Artifacts 处下载 shop-mobile-apk（含 .apk）。
on:
  workflow_dispatch:
    inputs:
      api_base:
        description: '后端 API 地址（含端口，如 https://api.example.com 或 http://1.2.3.4:5139；留空则在 App 内手动填）'
        required: false
        default: ''
      build_type:
        description: '构建类型（debug 可直接安装；release 为未签名包，需自行签名）'
        required: false
        default: 'debug'
        type: choice
        options:
          - debug
          - release

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    env:
      # 前端工程在仓库的 SourceCode/frontend 下
      WORK_DIR: SourceCode/frontend
      MOBILE_DIR: SourceCode/frontend/apps/mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ubuntu-latest 运行器已预装 Android SDK（ANDROID_HOME 已设、license 已接受），
      # 此步仅确保 cmdline-tools / build-tools 到位，缺时自动补齐。
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: ${{ env.WORK_DIR }}
        run: npm ci || npm install

      - name: Build mobile web assets
        working-directory: ${{ env.WORK_DIR }}
        env:
          VITE_API_BASE: ${{ github.event.inputs.api_base }}
        run: npm run build:mobile

      - name: Add & sync Android platform (Capacitor)
        working-directory: ${{ env.MOBILE_DIR }}
        run: |
          npx cap add android
          npx cap sync android

      # Android 9+ 默认禁止明文 HTTP，导致 App 连不上 http://IP:端口 的后端
      # （浏览器是另一应用、策略不同，所以浏览器能连而 App 不能）。
      # 这里给 <application> 加 usesCleartextTraffic="true"，允许局域网明文直连。
      - name: Enable cleartext HTTP (Android)
        working-directory: ${{ env.MOBILE_DIR }}/android
        run: |
          MANIFEST=app/src/main/AndroidManifest.xml
          if ! grep -q 'usesCleartextTraffic' "$MANIFEST"; then
            sed -i 's/<application/<application android:usesCleartextTraffic="true"/' "$MANIFEST"
          fi
          echo "---- AndroidManifest application tag ----"
          grep -n 'usesCleartextTraffic' "$MANIFEST"

      - name: Build APK with Gradle
        working-directory: ${{ env.MOBILE_DIR }}/android
        run: |
          chmod +x gradlew
          if [ "${{ github.event.inputs.build_type }}" = "release" ]; then
            ./gradlew --no-daemon assembleRelease
          else
            ./gradlew --no-daemon assembleDebug
          fi

      - name: List built APKs
        working-directory: ${{ env.MOBILE_DIR }}/android
        run: find app/build/outputs/apk -name "*.apk" -print

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: shop-mobile-apk
          path: ${{ env.MOBILE_DIR }}/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error
          retention-days: 30
