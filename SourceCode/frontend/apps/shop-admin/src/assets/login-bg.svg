<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#225f44"/>
      <stop offset="0.5" stop-color="#2d6a4f"/>
      <stop offset="1" stop-color="#40916c"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#74c69d" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#95d5b2" stop-opacity="0.18"/>
    </linearGradient>
    <g id="lotus-petal">
      <path d="M0 0 C 22 -34 22 -86 0 -120 C -22 -86 -22 -34 0 0 Z"/>
    </g>
  </defs>

  <!-- base gradient -->
  <rect width="1440" height="900" fill="url(#bg)"/>

  <!-- soft light blobs -->
  <circle cx="180" cy="140" r="360" fill="url(#glow)"/>
  <circle cx="1280" cy="780" r="420" fill="url(#glow)"/>
  <circle cx="1180" cy="120" r="220" fill="url(#glow)"/>

  <!-- gentle wellness waves at the bottom -->
  <path d="M0 720 C 320 660 520 800 760 760 C 1020 716 1180 800 1440 740 L 1440 900 L 0 900 Z"
        fill="#1b4d37" opacity="0.45"/>
  <path d="M0 800 C 300 760 560 860 820 820 C 1080 782 1240 850 1440 812 L 1440 900 L 0 900 Z"
        fill="#143d2b" opacity="0.5"/>

  <!-- bamboo / leaves, top-left -->
  <g stroke="#95d5b2" stroke-opacity="0.4" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M120 -20 C 150 120 150 260 120 400"/>
    <path d="M210 -20 C 240 130 240 280 210 430"/>
  </g>
  <g fill="url(#leaf)">
    <path d="M120 120 C 60 90 30 130 70 175 C 110 165 130 150 120 120 Z"/>
    <path d="M120 230 C 180 200 215 245 172 288 C 132 276 116 258 120 230 Z"/>
    <path d="M210 180 C 270 150 305 195 262 238 C 222 226 206 208 210 180 Z"/>
    <path d="M210 300 C 150 270 118 312 160 356 C 200 344 220 328 210 300 Z"/>
  </g>

  <!-- lotus flower, top-right -->
  <g transform="translate(1230 230)" fill="#b7e4c7" fill-opacity="0.5">
    <use href="#lotus-petal"/>
    <use href="#lotus-petal" transform="rotate(40)"/>
    <use href="#lotus-petal" transform="rotate(-40)"/>
    <use href="#lotus-petal" transform="rotate(78)"/>
    <use href="#lotus-petal" transform="rotate(-78)"/>
    <circle cx="0" cy="-12" r="16" fill="#ffffff" fill-opacity="0.45"/>
  </g>

  <!-- stacked massage stones, bottom-left -->
  <g transform="translate(250 705)">
    <ellipse cx="0" cy="0" rx="120" ry="34" fill="#0f3324" opacity="0.45"/>
    <ellipse cx="0" cy="-2" rx="104" ry="30" fill="#74c69d" fill-opacity="0.55"/>
    <ellipse cx="-6" cy="-50" rx="80" ry="24" fill="#52b788" fill-opacity="0.6"/>
    <ellipse cx="2" cy="-92" rx="58" ry="18" fill="#95d5b2" fill-opacity="0.65"/>
    <ellipse cx="-4" cy="-126" rx="38" ry="13" fill="#d8f3dc" fill-opacity="0.7"/>
  </g>

  <!-- acupressure / meridian dotted path, right side -->
  <g fill="#d8f3dc" fill-opacity="0.55">
    <circle cx="1050" cy="470" r="6"/>
    <circle cx="1110" cy="520" r="6"/>
    <circle cx="1175" cy="560" r="6"/>
    <circle cx="1245" cy="585" r="6"/>
    <circle cx="1320" cy="595" r="6"/>
  </g>
  <path d="M1050 470 C 1110 520 1175 560 1320 595" stroke="#d8f3dc" stroke-opacity="0.3"
        stroke-width="2" fill="none" stroke-dasharray="2 10" stroke-linecap="round"/>
</svg>
